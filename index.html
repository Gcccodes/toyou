<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كود خصم تويو</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#efefef;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:#fff;
border-radius:35px;
padding:35px 25px;
text-align:center;
}

.logo{
width:180px;
max-width:100%;
height:auto;
display:block;
margin:0 auto 20px;
object-fit:contain;
background:transparent;
}

h2{
font-size:20px;
margin-bottom:15px;
}

.percent{
font-size:72px;
font-weight:bold;
margin-bottom:20px;
}

.desc{
color:#666;
font-size:18px;
margin-bottom:25px;
}

.code{
border:4px dashed #888;
border-radius:25px;
padding:25px;
font-size:54px;
font-weight:bold;
margin-bottom:25px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:#111;
color:#fff;
font-size:22px;
cursor:pointer;
}

.note{
margin-top:20px;
font-size:16px;
}

.copy{
margin-top:35px;
font-size:18px;
font-weight:bold;
}
</style>

<script>
function copyCode(){
navigator.clipboard.writeText("GY95");
alert("تم نسخ الكود ✅");
}
</script>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo" alt="ToYou Logo">

<h2>كود خصم تويو لأول طلب حتى</h2>

<div class="percent">%100</div>

<div class="desc">
كود خصم 100% على رسوم التوصيل لكل المطاعم
</div>

<div class="code">
GY95
</div>

<button onclick="copyCode()">
📋 اضغط هنا لنسخ الكوبون
</button>

<div class="copy">
انسخ الكود واحصل على الخصم الآن
</div>

<div class="note">
🎁 خصم حتى 100% فعال داخل السعودية
</div>

</div>

</body>
</html>
